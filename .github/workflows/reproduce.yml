name: Reproduce shared core

on:
  push:
    branches: [main, "stage2-r2-align"]
  pull_request:
    branches: [main]

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run full reproduction + parity
        run: python reproduce_all.py
